<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelFinder - Discover Beautiful Images</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

<header>

<h1>🔎 Pixel Finder</h1>

<button id="darkmode">🌙 Dark</button>

</header>


<form id="search-form">

<input type="text" id="search" placeholder="Search high quality images...">

<button type="submit">Search</button>

</form>


<h2>Trending Images</h2>

<div id="loader"></div>

<div id="search-result"></div>


<div class="pagination">

<button id="prev">Previous</button>

<span id="page-number">1</span>

<button id="next">Next</button>

</div>


<div id="modal">

<span id="close">&times;</span>

<img id="modal-img">

<a id="download-btn" download>Download</a>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
